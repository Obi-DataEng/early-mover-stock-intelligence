name: Early Mover Weekly Run

on:
  schedule:
    # Every Monday at 7:00 AM ET (12:00 UTC)
    - cron: "0 12 * * 1"
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database
        run: python main.py --init-db
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Run pipeline
        run: python main.py --run
        env:
          # AI
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Reddit
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
          # News
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          # Email
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          # Optional: Quiver (Phase 2)
          # QUIVER_API_KEY: ${{ secrets.QUIVER_API_KEY }}

      - name: Upload picks output as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-picks-${{ github.run_id }}
          path: data/processed/
          retention-days: 90
